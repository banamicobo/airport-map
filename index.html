<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World's 40 Busiest Airports</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; font-family: 'Inter', system-ui, sans-serif; color: #e0e0e0; overflow: hidden; }
    #map { width: 100vw; height: 100vh; }

    #info-panel {
      position: absolute;
      top: 24px; left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background: rgba(10, 10, 20, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 14px 24px;
      text-align: center;
      min-width: 340px;
      pointer-events: none;
    }
    #info-panel h1 {
      font-size: 13px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #8888aa;
      margin-bottom: 4px;
    }
    #info-panel .hint {
      font-size: 12px;
      color: #555577;
    }

    #distance-panel {
      position: absolute;
      bottom: 32px; left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background: rgba(10, 10, 20, 0.92);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 18px 32px;
      text-align: center;
      display: none;
    }
    #distance-panel .airports-label {
      font-size: 13px;
      color: #aaaacc;
      margin-bottom: 10px;
      letter-spacing: 0.05em;
    }
    #distance-panel .distances {
      display: flex;
      gap: 40px;
      justify-content: center;
    }
    #distance-panel .dist-block { text-align: center; }
    #distance-panel .dist-value {
      font-size: 26px;
      font-weight: 600;
      color: #c8a96e;
      letter-spacing: -0.02em;
    }
    #distance-panel .dist-label {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #666688;
      margin-top: 2px;
    }

    #legend {
      position: absolute;
      bottom: 32px; right: 24px;
      z-index: 1000;
      background: rgba(10,10,20,0.85);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 11px;
      color: #666688;
    }
    #legend .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    #legend .dot-small {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #4a90d9;
      border: 1.5px solid #7ab8f5;
      flex-shrink: 0;
    }
    #legend .dot-large {
      width: 16px; height: 16px;
      border-radius: 50%;
      background: #c8a96e;
      border: 2px solid #f0d090;
      flex-shrink: 0;
    }

    .leaflet-tooltip {
      background: rgba(8, 8, 18, 0.95) !important;
      border: 1px solid rgba(255,255,255,0.1) !important;
      border-radius: 10px !important;
      padding: 10px 14px !important;
      color: #e0e0e0 !important;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5) !important;
      font-size: 12px !important;
      line-height: 1.6 !important;
      pointer-events: none !important;
      max-width: 260px;
    }
    .leaflet-tooltip::before { display: none !important; }
    .tooltip-name { font-size: 14px; font-weight: 600; color: #ffffff; margin-bottom: 4px; }
    .tooltip-iata { font-size: 11px; color: #888899; margin-bottom: 6px; letter-spacing: 0.08em; }
    .tooltip-row { display: flex; justify-content: space-between; gap: 16px; }
    .tooltip-key { color: #666688; }
    .tooltip-val { color: #c8c8d8; font-weight: 500; }
    .tooltip-a380 { margin-top: 6px; font-size: 11px; color: #c8a96e; }

    .leaflet-container { background: #0a0a0f !important; }
  </style>
</head>
<body>

<div id="info-panel">
  <h1>World's 40 Busiest Airports</h1>
  <div class="hint" id="hint-text">Click an airport to select · Scroll to zoom</div>
</div>

<div id="distance-panel">
  <div class="airports-label" id="airports-label"></div>
  <div class="distances">
    <div class="dist-block">
      <div class="dist-value" id="dist-straight">—</div>
      <div class="dist-label">Great Circle</div>
    </div>
    <div class="dist-block">
      <div class="dist-value" id="dist-flight">—</div>
      <div class="dist-label">Avg. Flight Path</div>
    </div>
  </div>
</div>

<div id="legend">
  <div class="legend-item">
    <div class="dot-large"></div>
    <span>A380-capable airport</span>
  </div>
  <div class="legend-item">
    <div class="dot-small"></div>
    <span>Standard airport</span>
  </div>
</div>

<div id="map"></div>

<script>
const airports = [
  { iata:"ATL", name:"Hartsfield-Jackson Atlanta", city:"Atlanta, USA", lat:33.6407, lng:-84.4277, pax:104700000, year:1926, terminals:1, a380:false },
  { iata:"DXB", name:"Dubai International", city:"Dubai, UAE", lat:25.2532, lng:55.3657, pax:86900000, year:1960, terminals:3, a380:true },
  { iata:"DFW", name:"Dallas/Fort Worth International", city:"Dallas, USA", lat:32.8998, lng:-97.0403, pax:81800000, year:1974, terminals:5, a380:false },
  { iata:"ORD", name:"Chicago O'Hare International", city:"Chicago, USA", lat:41.9742, lng:-87.9073, pax:77800000, year:1944, terminals:4, a380:false },
  { iata:"IST", name:"Istanbul Airport", city:"Istanbul, Turkey", lat:41.2753, lng:28.7519, pax:76300000, year:2018, terminals:1, a380:false },
  { iata:"LHR", name:"London Heathrow", city:"London, UK", lat:51.4700, lng:-0.4543, pax:79200000, year:1946, terminals:4, a380:true },
  { iata:"HND", name:"Tokyo Haneda", city:"Tokyo, Japan", lat:35.5494, lng:139.7798, pax:75900000, year:1931, terminals:3, a380:true },
  { iata:"DEN", name:"Denver International", city:"Denver, USA", lat:39.8561, lng:-104.6737, pax:77800000, year:1995, terminals:1, a380:false },
  { iata:"LAX", name:"Los Angeles International", city:"Los Angeles, USA", lat:33.9425, lng:-118.4081, pax:75000000, year:1930, terminals:9, a380:true },
  { iata:"DEL", name:"Indira Gandhi International", city:"New Delhi, India", lat:28.5562, lng:77.1000, pax:72200000, year:1962, terminals:3, a380:false },
  { iata:"CAN", name:"Guangzhou Baiyun International", city:"Guangzhou, China", lat:23.3924, lng:113.2988, pax:70500000, year:2004, terminals:2, a380:false },
  { iata:"PVG", name:"Shanghai Pudong International", city:"Shanghai, China", lat:31.1443, lng:121.8083, pax:70000000, year:1999, terminals:2, a380:true },
  { iata:"CDG", name:"Paris Charles de Gaulle", city:"Paris, France", lat:49.0097, lng:2.5479, pax:67400000, year:1974, terminals:3, a380:true },
  { iata:"ICN", name:"Seoul Incheon International", city:"Seoul, South Korea", lat:37.4602, lng:126.4407, pax:65700000, year:2001, terminals:2, a380:true },
  { iata:"JFK", name:"New York JFK International", city:"New York, USA", lat:40.6413, lng:-73.7781, pax:64200000, year:1948, terminals:6, a380:true },
  { iata:"FRA", name:"Frankfurt Airport", city:"Frankfurt, Germany", lat:50.0379, lng:8.5622, pax:59400000, year:1936, terminals:2, a380:true },
  { iata:"AMS", name:"Amsterdam Airport Schiphol", city:"Amsterdam, Netherlands", lat:52.3105, lng:4.7683, pax:61900000, year:1916, terminals:1, a380:true },
  { iata:"BKK", name:"Bangkok Suvarnabhumi", city:"Bangkok, Thailand", lat:13.6900, lng:100.7501, pax:60900000, year:2006, terminals:1, a380:true },
  { iata:"MAD", name:"Adolfo Suárez Madrid-Barajas", city:"Madrid, Spain", lat:40.4936, lng:-3.5668, pax:60200000, year:1931, terminals:4, a380:true },
  { iata:"MCO", name:"Orlando International", city:"Orlando, USA", lat:28.4312, lng:-81.3081, pax:57800000, year:1981, terminals:4, a380:false },
  { iata:"SIN", name:"Singapore Changi Airport", city:"Singapore", lat:1.3644, lng:103.9915, pax:58900000, year:1981, terminals:4, a380:true },
  { iata:"DOH", name:"Hamad International Airport", city:"Doha, Qatar", lat:25.2731, lng:51.6080, pax:52400000, year:2014, terminals:1, a380:true },
  { iata:"MIA", name:"Miami International Airport", city:"Miami, USA", lat:25.7959, lng:-80.2870, pax:52300000, year:1928, terminals:3, a380:false },
  { iata:"LAS", name:"Harry Reid International", city:"Las Vegas, USA", lat:36.0840, lng:-115.1537, pax:52000000, year:1942, terminals:4, a380:false },
  { iata:"SZX", name:"Shenzhen Bao'an International", city:"Shenzhen, China", lat:22.6397, lng:113.8107, pax:51800000, year:1991, terminals:3, a380:false },
  { iata:"YYZ", name:"Toronto Pearson International", city:"Toronto, Canada", lat:43.6777, lng:-79.6248, pax:50500000, year:1939, terminals:2, a380:false },
  { iata:"SFO", name:"San Francisco International", city:"San Francisco, USA", lat:37.6213, lng:-122.3790, pax:50400000, year:1927, terminals:4, a380:true },
  { iata:"KUL", name:"Kuala Lumpur International", city:"Kuala Lumpur, Malaysia", lat:2.7456, lng:101.7099, pax:48200000, year:1998, terminals:2, a380:true },
  { iata:"MUC", name:"Munich Airport", city:"Munich, Germany", lat:48.3537, lng:11.7750, pax:48000000, year:1992, terminals:2, a380:true },
  { iata:"CGK", name:"Soekarno–Hatta International", city:"Jakarta, Indonesia", lat:-6.1256, lng:106.6559, pax:47900000, year:1985, terminals:3, a380:false },
  { iata:"FCO", name:"Leonardo da Vinci – Fiumicino", city:"Rome, Italy", lat:41.8045, lng:12.2508, pax:46000000, year:1961, terminals:4, a380:false },
  { iata:"EWR", name:"Newark Liberty International", city:"New York, USA", lat:40.6895, lng:-74.1745, pax:46300000, year:1928, terminals:3, a380:false },
  { iata:"SYD", name:"Sydney Kingsford Smith", city:"Sydney, Australia", lat:-33.9399, lng:151.1753, pax:44400000, year:1920, terminals:3, a380:true },
  { iata:"BCN", name:"Barcelona El Prat Airport", city:"Barcelona, Spain", lat:41.2974, lng:2.0833, pax:40000000, year:1963, terminals:2, a380:false },
  { iata:"HKG", name:"Hong Kong International", city:"Hong Kong", lat:22.3080, lng:113.9185, pax:40700000, year:1998, terminals:2, a380:true },
  { iata:"PEK", name:"Beijing Capital International", city:"Beijing, China", lat:40.0801, lng:116.5846, pax:40500000, year:1958, terminals:3, a380:true },
  { iata:"PKX", name:"Beijing Daxing International", city:"Beijing, China", lat:39.5098, lng:116.4105, pax:35000000, year:2019, terminals:1, a380:false },
  { iata:"MEX", name:"Mexico City International", city:"Mexico City, Mexico", lat:19.4363, lng:-99.0721, pax:35000000, year:1952, terminals:2, a380:false },
  { iata:"AUH", name:"Abu Dhabi International", city:"Abu Dhabi, UAE", lat:24.4330, lng:54.6511, pax:24000000, year:1982, terminals:3, a380:true },
  { iata:"NRT", name:"Tokyo Narita International", city:"Tokyo, Japan", lat:35.7720, lng:140.3929, pax:27000000, year:1978, terminals:3, a380:true },
];

// Map init
const map = L.map('map', {
  center: [20, 10],
  zoom: 3,
  zoomControl: false,
  minZoom: 2,
  maxZoom: 12,
  scrollWheelZoom: true,
});

L.control.zoom({ position: 'bottomleft' }).addTo(map);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap contributors © CARTO',
  subdomains: 'abcd',
  maxZoom: 20,
}).addTo(map);

// State
let selected = [];
let arcLayer = null;
const markerRefs = {};

function fmt(n) {
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(0) + 'K';
  return n;
}

function tooltipHtml(a) {
  return `
    <div class="tooltip-name">${a.name}</div>
    <div class="tooltip-iata">${a.iata} · ${a.city}</div>
    <div class="tooltip-row"><span class="tooltip-key">Passengers (2023)</span><span class="tooltip-val">${fmt(a.pax)}</span></div>
    <div class="tooltip-row"><span class="tooltip-key">Terminals</span><span class="tooltip-val">${a.terminals}</span></div>
    <div class="tooltip-row"><span class="tooltip-key">Opened</span><span class="tooltip-val">${a.year}</span></div>
    ${a.a380 ? '<div class="tooltip-a380">✦ Airbus A380 capable</div>' : ''}
  `;
}

function makeStyle(a, isSelected) {
  if (a.a380) {
    return {
      radius: isSelected ? 14 : 11,
      fillColor: isSelected ? '#f0d090' : '#c8a96e',
      color: isSelected ? '#ffffff' : '#f0d090',
      weight: isSelected ? 3 : 2,
      fillOpacity: isSelected ? 1 : 0.85,
      opacity: 1,
    };
  } else {
    return {
      radius: isSelected ? 10 : 7,
      fillColor: isSelected ? '#7ab8f5' : '#3a6fa0',
      color: isSelected ? '#ffffff' : '#7ab8f5',
      weight: isSelected ? 2.5 : 1.5,
      fillOpacity: isSelected ? 1 : 0.8,
      opacity: 1,
    };
  }
}

// Haversine distance in km
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
  return 2 * R * Math.asin(Math.sqrt(a));
}

// Great circle intermediate points
function greatCirclePoints(lat1, lon1, lat2, lon2, n=120) {
  const toRad = d => d * Math.PI / 180;
  const toDeg = r => r * 180 / Math.PI;
  const φ1 = toRad(lat1), λ1 = toRad(lon1);
  const φ2 = toRad(lat2), λ2 = toRad(lon2);

  const d = 2 * Math.asin(Math.sqrt(
    Math.sin((φ2-φ1)/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin((λ2-λ1)/2)**2
  ));

  const pts = [];
  for (let i = 0; i <= n; i++) {
    const f = i / n;
    const A = Math.sin((1-f)*d) / Math.sin(d);
    const B = Math.sin(f*d) / Math.sin(d);
    const x = A*Math.cos(φ1)*Math.cos(λ1) + B*Math.cos(φ2)*Math.cos(λ2);
    const y = A*Math.cos(φ1)*Math.sin(λ1) + B*Math.cos(φ2)*Math.sin(λ2);
    const z = A*Math.sin(φ1) + B*Math.sin(φ2);
    pts.push([toDeg(Math.atan2(z, Math.sqrt(x*x+y*y))), toDeg(Math.atan2(y, x))]);
  }
  return pts;
}

function updateArc() {
  if (arcLayer) { map.removeLayer(arcLayer); arcLayer = null; }
  document.getElementById('distance-panel').style.display = 'none';

  if (selected.length === 2) {
    const [a, b] = selected.map(iata => airports.find(x => x.iata === iata));
    const pts = greatCirclePoints(a.lat, a.lng, b.lat, b.lng);

    arcLayer = L.polyline(pts, {
      color: '#c8a96e',
      weight: 2,
      opacity: 0.85,
      dashArray: '6 4',
    }).addTo(map);

    const dist = haversine(a.lat, a.lng, b.lat, b.lng);
    const flightDist = dist * 1.055;

    document.getElementById('airports-label').textContent = `${a.iata} ↔ ${b.iata}`;
    document.getElementById('dist-straight').textContent = Math.round(dist).toLocaleString() + ' km';
    document.getElementById('dist-flight').textContent = Math.round(flightDist).toLocaleString() + ' km';
    document.getElementById('distance-panel').style.display = 'block';
  }
}

function updateHint() {
  const el = document.getElementById('hint-text');
  if (selected.length === 0) el.textContent = 'Click an airport to select · Scroll to zoom';
  else if (selected.length === 1) el.textContent = `${selected[0]} selected — click a second airport or click map to deselect`;
  else el.textContent = `${selected[0]} ↔ ${selected[1]} — click map to clear`;
}

function refreshMarkers() {
  airports.forEach(a => {
    const m = markerRefs[a.iata];
    const isSel = selected.includes(a.iata);
    m.setStyle(makeStyle(a, isSel));
  });
}

// Create markers
airports.forEach(a => {
  const m = L.circleMarker([a.lat, a.lng], makeStyle(a, false))
    .addTo(map)
    .bindTooltip(tooltipHtml(a), { sticky: true, className: '', direction: 'auto', offset: [10, 0] });

  m.on('click', e => {
    L.DomEvent.stopPropagation(e);
    if (selected.includes(a.iata)) {
      selected = selected.filter(x => x !== a.iata);
    } else if (selected.length < 2) {
      selected.push(a.iata);
    } else {
      selected = [a.iata];
    }
    refreshMarkers();
    updateArc();
    updateHint();
  });

  markerRefs[a.iata] = m;
});

// Click on map = clear selection
map.on('click', () => {
  selected = [];
  refreshMarkers();
  updateArc();
  updateHint();
});
</script>
</body>
</html>
